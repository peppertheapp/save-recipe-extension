<!doctype html>
<html><head><title>mom&#8217;s apple cake &#8211; smitten kitchen</title>
<script type="application/ld+json">
{
  "@context": "https://schema.org/",
  "@type": "Recipe",
  "name": "mom&#8217;s apple cake",
  "author": "deb",
  "description": "An impossibly moist apple cake &#8212; the one everyone&#8217;s mom made in the 70s.",
  "image": "https://img.example.com/apple-cake.jpg",
  "recipeYield": "16 servings",
  "totalTime": "PT2H",
  "recipeIngredient": [
    "6 apples, Mom uses McIntosh apples",
    "1 tablespoon cinnamon",
    "5 tablespoons sugar",
    "2 3/4 cups flour, sifted",
    "1 tablespoon baking powder",
    "1 teaspoon salt",
    "1 cup vegetable oil",
    "2 cups sugar",
    "1/4 cup orange juice",
    "2 1/2 teaspoons vanilla",
    "4 eggs"
  ],
  "recipeInstructions": "Preheat oven to 350 degrees. Grease a tube pan.\nPeel, core and chop apples into chunks. Toss with cinnamon and sugar and set aside.\nStir together flour, baking powder and salt in a large mixing bowl.\nIn a separate bowl, whisk together oil, sugar, orange juice, vanilla and eggs.\nMix wet ingredients into the dry ones, then pour half of batter into prepared pan. Spread half of apples over it. Pour the remaining batter over the apples and arrange the remaining apples on top.\nBake for about 1 1/2 hours, or until a tester comes out clean."
}
</script></head><body></body></html>
