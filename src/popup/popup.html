<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pepper Recipe Importer</title>
    <style>
      body {
        width: 320px;
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #222;
      }
      header {
        background: #1db954;
        color: #fff;
        padding: 14px 16px;
        font-size: 16px;
        font-weight: 700;
      }
      section { padding: 14px 16px; border-bottom: 1px solid #eee; }
      h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin: 0 0 8px; }
      .row { display: flex; gap: 8px; }
      input[type='text'] {
        flex: 1; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px;
      }
      button.primary {
        background: #1db954; color: #fff; border: none; border-radius: 6px;
        padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
      }
      button.primary:disabled { opacity: 0.5; cursor: default; }
      .status { margin-top: 8px; font-size: 13px; }
      .status.ok { color: #188038; }
      .status.err { color: #d93025; }
      label.toggle { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }
      .hint { font-size: 11px; color: #999; margin-top: 6px; }
      ul#history { list-style: none; margin: 0; padding: 0; max-height: 160px; overflow-y: auto; }
      ul#history li { padding: 6px 0; font-size: 13px; border-bottom: 1px solid #f4f4f4; }
      ul#history a { color: #1a73e8; text-decoration: none; }
      .empty { font-size: 13px; color: #999; }
    </style>
  </head>
  <body>
    <header>🌶 Pepper Recipe Importer</header>

    <section id="connect-section">
      <h2>Account</h2>
      <div class="row">
        <input id="user-id" type="text" placeholder="Pepper secret code" autocomplete="off" />
        <button id="connect" class="primary">Connect</button>
      </div>
      <div id="connect-status" class="status"></div>
      <div class="hint">Find your secret code in the Pepper app: Settings → Connect browser extension.</div>
    </section>

    <section>
      <h2>Recent saves</h2>
      <ul id="history"></ul>
      <div id="history-empty" class="empty">Nothing saved yet — find a recipe!</div>
    </section>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
